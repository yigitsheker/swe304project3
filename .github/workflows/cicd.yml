name: SWE304 CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  build-push-and-deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Give permission to Maven wrapper
        run: chmod +x mvnw

      - name: Build JAR with Maven
        run: ./mvnw clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/swe304project3:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/swe304project3:${{ github.sha }}

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Create deployment directory on EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ec2_key.pem \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "mkdir -p /home/ubuntu/swe304project3-deploy"

      - name: Copy deployment files to EC2
        run: |
          scp -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ec2_key.pem \
              deploy/compose.yml \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/swe304project3-deploy/compose.yml"

          scp -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ec2_key.pem \
              deploy/deploy.sh \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/swe304project3-deploy/deploy.sh"

      - name: Run deployment script on EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ec2_key.pem \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "chmod +x /home/ubuntu/swe304project3-deploy/deploy.sh && /home/ubuntu/swe304project3-deploy/deploy.sh"